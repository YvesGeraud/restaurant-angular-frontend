<app-modal [isOpen]="isOpen()" [title]="platillo() ? 'Editar Platillo' : 'Nuevo Platillo'" (closeModal)="onClose()">
  <form [formGroup]="form" (ngSubmit)="onSave()">
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label">Nombre del Platillo</label>
        <input type="text" class="form-control" formControlName="nombre" placeholder="Ej. Tacos al Pastor">
      </div>
      <div class="col-md-4">
        <label class="form-label">Categoría</label>
        <select class="form-select" formControlName="idCategoria">
          <option [ngValue]="null" disabled>Seleccionar...</option>
          <option *ngFor="let cat of categoriaStore.categoriasActivas()" [value]="cat.id">
            {{ cat.nombre }}
          </option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" formControlName="descripcion" rows="2" placeholder="Ingredientes, preparación..."></textarea>
      </div>
      <div class="col-md-6">
        <label class="form-label">Precio</label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input type="number" step="0.01" class="form-control" formControlName="precio">
        </div>
      </div>
      <div class="col-md-6">
        <label class="form-label">URL de Imagen (Opcional)</label>
        <input type="url" class="form-control" formControlName="imagenUrl" placeholder="https://...">
      </div>
      <div class="col-12" *ngIf="platillo()">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" formControlName="estado" id="estadoSwitch">
          <label class="form-check-label" for="estadoSwitch">Disponible en menú</label>
        </div>
      </div>
    </div>
    <div class="d-flex justify-content-end gap-2 mt-4">
      <button type="button" class="btn btn-secondary" (click)="onClose()">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Guardar Platillo</button>
    </div>
  </form>
</app-modal>
