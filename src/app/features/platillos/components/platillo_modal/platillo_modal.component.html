<app-modal
  [isOpen]="isOpen()"
  [title]="platillo() ? 'Editar Platillo' : 'Nuevo Platillo'"
  (modalClose)="onClose()"
>
  <form [formGroup]="form" (ngSubmit)="onSave()" class="py-2">
    <div class="row g-4">
      <!-- Nombre -->
      <div class="col-md-12">
        <label for="p_nombre" class="form-label fw-bold small text-uppercase text-muted"
          >Nombre del Platillo</label
        >
        <input
          id="p_nombre"
          type="text"
          class="form-control form-control-lg border-2 shadow-none"
          formControlName="nombre"
          placeholder="Ej. Salmón a la Parrilla"
          [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched"
        />
        <div class="invalid-feedback">El nombre es requerido (mínimo 3 caracteres).</div>
      </div>

      <!-- Categoría -->
      <div class="col-md-6">
        <label for="p_categoria" class="form-label fw-bold small text-uppercase text-muted"
          >Categoría</label
        >
        <select
          id="p_categoria"
          class="form-select form-select-lg border-2 shadow-none"
          formControlName="idCategoria"
          [class.is-invalid]="form.get('idCategoria')?.invalid && form.get('idCategoria')?.touched"
        >
          <option [value]="null" disabled>Seleccione...</option>
          @for (cat of categoriaStore.categoriasActivas(); track cat.id) {
            <option [value]="cat.id">
              {{ cat.nombre }}
            </option>
          }
        </select>
        <div class="invalid-feedback">La categoría es obligatoria.</div>
      </div>

      <!-- Precio -->
      <div class="col-md-6">
        <label for="p_precio" class="form-label fw-bold small text-uppercase text-muted"
          >Precio (USD)</label
        >
        <div class="input-group input-group-lg">
          <span class="input-group-text bg-light border-2 border-end-0">$</span>
          <input
            id="p_precio"
            type="number"
            class="form-control border-2 shadow-none"
            formControlName="precio"
            step="0.01"
            min="0"
            [class.is-invalid]="form.get('precio')?.invalid && form.get('precio')?.touched"
          />
        </div>
        @if (form.get('precio')?.invalid && form.get('precio')?.touched) {
          <div class="invalid-feedback d-block">El precio debe ser mayor a 0.</div>
        }
      </div>

      <!-- Descripción -->
      <div class="col-md-12">
        <label for="p_descripcion" class="form-label fw-bold small text-uppercase text-muted"
          >Descripción</label
        >
        <textarea
          id="p_descripcion"
          class="form-control border-2 shadow-none"
          formControlName="descripcion"
          rows="3"
          placeholder="Detalles de preparación, ingredientes, etc."
        ></textarea>
        <div class="text-end extra-small text-muted mt-1">
          {{ form.get('descripcion')?.value?.length || 0 }} / 500
        </div>
      </div>

      <!-- URL de Imagen -->
      <div class="col-md-12">
        <label for="p_imagen" class="form-label fw-bold small text-uppercase text-muted"
          >URL de la Imagen (Opcional)</label
        >
        <input
          id="p_imagen"
          type="url"
          class="form-control border-2 shadow-none"
          formControlName="imagenUrl"
          placeholder="https://ejemplo.com/imagen.jpg"
        />
      </div>

      <!-- Estado -->
      <div class="col-md-12">
        <div class="form-check form-switch p-3 bg-light rounded-3 d-flex align-items-center gap-3">
          <input
            id="p_estado"
            class="form-check-input ms-0 shadow-none"
            type="checkbox"
            formControlName="estado"
          />
          <label class="form-check-label fw-bold text-dark" for="p_estado"
            >Disponible para la Venta</label
          >
        </div>
      </div>
    </div>

    <!-- Botones de Acción -->
    <div class="d-flex justify-content-end gap-3 mt-4 pt-4 border-top">
      <button
        type="button"
        class="btn btn-light btn-lg rounded-pill px-4 fw-semibold"
        (click)="onClose()"
      >
        Cancelar
      </button>
      <button
        type="submit"
        class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow-sm"
        [disabled]="form.invalid"
      >
        <i class="bi bi-save me-2"></i>
        {{ platillo() ? 'Actualizar Platillo' : 'Crear Platillo' }}
      </button>
    </div>
  </form>
</app-modal>
