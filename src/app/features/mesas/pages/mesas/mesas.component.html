<div class="container-fluid py-4">
  <!-- Header con Título y Acciones -->
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
    <div>
      <h2 class="display-6 fw-bold text-dark mb-1">Gestión de Mesas</h2>
      <p class="text-muted mb-0">Controla el estado y disponibilidad de las mesas del restaurante</p>
    </div>
    
    <div class="d-flex gap-2">
      <a routerLink="batch" class="btn btn-outline-primary shadow-sm d-flex align-items-center gap-2">
        <i class="bi bi-layers"></i>
        <span>Carga Masiva</span>
      </a>
      <button *appHasPermission="'MESAS_CREAR'" (click)="onNuevaMesa()" 
              class="btn btn-primary shadow-sm d-flex align-items-center gap-2 px-4">
        <i class="bi bi-plus-lg"></i>
        <span>Nueva Mesa</span>
      </button>
    </div>
  </div>

  <!-- Barra de Filtros y Búsqueda -->
  <div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body p-3">
      <div class="row g-3">
        <div class="col-md-8">
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text" class="form-control border-start-0 ps-0 shadow-none" 
                   placeholder="Buscar mesa por código o capacidad..." 
                   (input)="onSearch(searchInput.value)" #searchInput>
          </div>
        </div>
        <div class="col-md-4">
          <div class="d-flex gap-2">
            <select class="form-select shadow-none" (change)="store.applyFilter({ status: statusFilter.value || undefined })" #statusFilter>
              <option value="">Todos los estados</option>
              <option value="libre">Libre</option>
              <option value="ocupada">Ocupada</option>
              <option value="reservada">Reservada</option>
            </select>
            <select class="form-select shadow-none" (change)="store.applyFilter({ estado: activeFilter.value === '' ? undefined : activeFilter.value === 'true' })" #activeFilter>
              <option value="">Cualquier disponibilidad</option>
              <option value="true">Activas</option>
              <option value="false">Inactivas</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Grid de Mesas -->
  <div class="row g-4 mb-4">
    <!-- Skeleton Loading -->
    <ng-container *ngIf="store.loading()">
      <div class="col-12 col-md-6 col-lg-4 col-xl-3" *ngFor="let i of [1,2,3,4,5,6,7,8]">
        <app-mesa-skeleton></app-mesa-skeleton>
      </div>
    </ng-container>

    <!-- Lista de Mesas -->
    <ng-container *ngIf="!store.loading()">
      <div class="col-12 col-md-6 col-lg-4 col-xl-3" *ngFor="let mesa of store.mesas()">
        <app-mesa-card 
          [mesa]="mesa"
          (onEdit)="onEditarMesa($event)"
          (onDelete)="onEliminarMesa($event)"
          (onActivate)="onReactivarMesa($event)">
        </app-mesa-card>
      </div>

      <!-- Empty State -->
      <div class="col-12 text-center py-5" *ngIf="store.mesas().length === 0">
        <div class="mb-3">
          <i class="bi bi-inboxes display-1 text-light"></i>
        </div>
        <h4 class="text-muted">No se encontraron mesas</h4>
        <p class="text-muted">Intenta cambiar los filtros o agrega una nueva mesa.</p>
      </div>
    </ng-container>
  </div>

  <!-- Paginador -->
  <div class="d-flex justify-content-center mt-4">
    <app-paginator 
      [total]="store.totalPaginas()" 
      [current]="store.paginaActual()"
      (pageChange)="onPageChange($event)">
    </app-paginator>
  </div>
</div>

<!-- Modal de Formulario -->
<app-mesa-modal
  [isOpen]="isModalOpen"
  [mesa]="selectedMesa"
  (close)="onCerrarModal()"
  (save)="onGuardarMesa($event)">
</app-mesa-modal>
