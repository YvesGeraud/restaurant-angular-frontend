<div class="app-layout min-vh-100 d-flex flex-column bg-light">
  <!-- Top Navbar -->
  <app-navbar></app-navbar>

  <!-- Barra móvil con hamburguesa (solo visible en pantallas < md) -->
  <div class="mobile-topbar d-flex d-md-none align-items-center px-3 py-2 bg-white border-bottom shadow-sm">
    <button
      class="btn btn-link text-dark p-0 me-3"
      type="button"
      (click)="toggleSidebar()"
      aria-label="Abrir menú de navegación"
    >
      <i class="bi bi-list fs-3"></i>
    </button>
    <span class="fw-semibold text-truncate">Panel Administrativo</span>
  </div>

  <!-- Backdrop para cerrar el sidebar al tocar fuera (solo móvil) -->
  @if (sidebarAbierto()) {
    <div
      class="sidebar-backdrop d-md-none"
      role="presentation"
      (click)="cerrarSidebar()"
    ></div>
  }

  <div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <aside
      class="sidebar bg-white border-end shadow-sm flex-column"
      [class.sidebar--abierto]="sidebarAbierto()"
    >
      <div class="p-3">
        <!-- Botón de cierre visible solo en móvil -->
        <button
          class="btn btn-link text-muted d-flex d-md-none ms-auto mb-2 p-0"
          type="button"
          (click)="cerrarSidebar()"
          aria-label="Cerrar menú"
        >
          <i class="bi bi-x-lg fs-5"></i>
        </button>

        <span class="text-uppercase text-muted fw-bold small tracking-wider mb-2 d-block px-3"
          >Gestión</span
        >
        <ul class="nav nav-pills flex-column gap-1">
          <li class="nav-item" *appHasPermission="'REPORTES_VER'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/dashboard"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-speedometer2 me-3 fs-5"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item" *appHasPermission="'USUARIOS_VER'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/usuarios"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-people me-3 fs-5"></i>
              <span>Personal</span>
            </a>
          </li>
          <li class="nav-item" *appHasPermission="'PLATILLOS_VER'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/platillos"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-egg-fried me-3 fs-5"></i>
              <span>Platillos</span>
            </a>
          </li>
          <li class="nav-item" *appHasPermission="'RESERVACIONES_VER'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/mesas"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-grid-3x3-gap me-3 fs-5"></i>
              <span>Mesas</span>
            </a>
          </li>
          <li class="nav-item" *appHasPermission="'RESERVACIONES_VER'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/reservaciones"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-calendar-check me-3 fs-5"></i>
              <span>Reservaciones</span>
            </a>
          </li>
          <li class="nav-item" *appHasPermission="'ORDENES_CREAR'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/ordenes"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-receipt me-3 fs-5"></i>
              <span>Órdenes</span>
            </a>
          </li>
          <li class="nav-item" *appHasPermission="'ORDENES_ESTADO'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/cocina"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-fire me-3 fs-5"></i>
              <span>Cocina</span>
            </a>
          </li>
          <li class="nav-item" *appHasPermission="'REPORTES_VER'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/reportes"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-graph-up me-3 fs-5"></i>
              <span>Reportes</span>
            </a>
          </li>
          <li class="nav-item" *appHasPermission="'CLIENTES_VER'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/clientes"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-person-lines-fill me-3 fs-5"></i>
              <span>Clientes</span>
            </a>
          </li>
          <li class="nav-item" *appHasPermission="'CONFIG_VER'">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/configuracion"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-gear me-3 fs-5"></i>
              <span>Configuración</span>
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link text-dark py-2 px-3 d-flex align-items-center"
              routerLink="/admin/change-password"
              routerLinkActive="active bg-primary text-white"
              (click)="cerrarSidebar()"
            >
              <i class="bi bi-shield-lock me-3 fs-5"></i>
              <span>Cambiar contraseña</span>
            </a>
          </li>
        </ul>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content flex-grow-1 p-4 overflow-auto" style="height: calc(100vh - 76px)">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
