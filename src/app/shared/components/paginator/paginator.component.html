<nav aria-label="Page navigation" class="mt-4">
  <ul class="pagination justify-content-center">
    <li class="page-item" [class.disabled]="current() === 1">
      <button class="page-link" (click)="onPrev()">Anterior</button>
    </li>
    @for (page of pages(); track page) {
      <li class="page-item" [class.active]="page === current()">
        <button class="page-link" (click)="onPageClick(page)">{{ page }}</button>
      </li>
    }
    <li class="page-item" [class.disabled]="current() === total()">
      <button class="page-link" (click)="onNext()">Siguiente</button>
    </li>
  </ul>
</nav>
