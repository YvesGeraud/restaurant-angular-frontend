<div class="search-box position-relative" [style.width]="width()">
  <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
  <input
    type="text"
    class="form-control form-control-sm border-0 bg-light ps-5 rounded-pill py-2 shadow-none"
    [placeholder]="placeholder()"
    (input)="onInput($event)"
  />
</div>
