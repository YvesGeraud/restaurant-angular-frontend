<div class="app-container translate-center" *ngIf="!authStore.isInitialized()" style="background-color: #121212; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 10000; display: flex; align-items: center; justify-content: center;">
  <div class="d-flex flex-column align-items-center justify-content-center">
    <div class="spinner-grow" style="width: 3rem; height: 3rem; color: #d4af37;" role="status">
      <span class="visually-hidden">Iniciando...</span>
    </div>
  </div>
</div>

<div class="app-root" *ngIf="authStore.isInitialized()">
  <router-outlet></router-outlet>
</div>
