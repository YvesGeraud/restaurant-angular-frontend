@if (!authStore.isInitialized()) {
  <div
    class="app-container"
    style="
      background-color: #121212;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
    "
  >
    <div class="d-flex flex-column align-items-center justify-content-center animate-pulse">
      <div class="spinner-grow" style="width: 3.5rem; height: 3.5rem; color: #d4af37" role="status">
        <span class="visually-hidden">Iniciando sistema...</span>
      </div>
      <p class="mt-4 text-white-50 tracking-wider small fw-bold">CARGANDO SISTEMA</p>
    </div>
  </div>
}

@if (authStore.isInitialized()) {
  <div class="app-root animate-fade-in">
    <router-outlet></router-outlet>
  </div>
}
